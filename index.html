<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's That Classmate? | World Selfie Day</title>
    <style>
        /* Estética Pop-Art con elementos dinámicos integrados */
        body {
            font-family: 'Arial Black', 'Impact', sans-serif;
            background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.15) 0%, transparent 20%),
                        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.15) 0%, transparent 20%),
                        linear-gradient(135deg, #39B5E0, #FFD93D);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Marcos festivos integrados */
        .party-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .emoji-art {
            position: absolute;
            font-size: 3rem;
            user-select: none;
            filter: drop-shadow(3px 3px 0px #000);
            animation: bounceDance 3s ease-in-out infinite alternate;
        }
        
        @keyframes bounceDance {
            0% { transform: translateY(0) scale(1) rotate(-10deg); }
            100% { transform: translateY(-20px) scale(1.1) rotate(10deg); }
        }

        .art1 { top: 4%; left: 5%; animation-delay: 0s; }
        .art2 { top: 8%; right: 5%; font-size: 4rem; animation-delay: 0.5s; }
        .art3 { bottom: 8%; left: 4%; animation-delay: 1s; }
        .art4 { bottom: 6%; right: 6%; font-size: 3.5rem; animation-delay: 1.5s; }

        h1 {
            color: #FF007F; /* Rosa neón */
            text-shadow: 5px 5px 0px #FFF, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000, 2px 2px 0px #000;
            font-size: 3.8rem;
            margin-bottom: 5px;
            text-align: center;
            letter-spacing: 3px;
            z-index: 2;
            position: relative;
        }

        p.subtitle {
            font-family: 'Arial', sans-serif;
            color: #FFF;
            font-weight: 900;
            text-shadow: 2.5px 2.5px 0px #000;
            font-size: 1.4rem;
            margin-bottom: 20px;
            text-align: center;
            z-index: 2;
            position: relative;
        }

        .score-board {
            font-family: 'Arial Black', sans-serif;
            font-size: 1.5rem;
            color: #000;
            background-color: #FFD93D;
            padding: 8px 20px;
            border-radius: 20px;
            border: 4px solid #000;
            box-shadow: 4px 4px 0px #000;
            margin-bottom: 20px;
            display: inline-block;
            z-index: 2;
            position: relative;
        }

        .game-container {
            background: #39B5E0; /* Azul Canva */
            padding: 40px;
            border-radius: 35px;
            box-shadow: 12px 12px 0px #000;
            max-width: 520px;
            width: 100%;
            text-align: center;
            border: 6px solid #000;
            z-index: 2;
            position: relative;
            background-image: radial-gradient(#FFF 15%, transparent 16%);
            background-size: 16px 16px;
        }

        /* Contenedor del marco de la foto */
        .image-box {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 25px auto;
            border-radius: 20px;
            overflow: hidden;
            background-color: #000; 
            border: 5px solid #000;
            box-shadow: 8px 8px 0px #FFF;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: filter 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Súper pixelado y oscuro al inicio */
            filter: blur(25px) brightness(0.12) contrast(2);
        }

        .image-box.revealed img {
            filter: blur(0px) brightness(1) contrast(1);
        }

        /* --- CONTENEDOR DE PISTAS (RANDOM FACTS) --- */
        .hints-box {
            background-color: #FFF;
            border: 4px solid #000;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 25px;
            box-shadow: 5px 5px 0px #000;
            text-align: left;
            transition: all 0.5s ease;
        }

        /* Cuando se revela, las pistas cambian de color festivo */
        .game-container.revealed-state .hints-box {
            background-color: #FFD93D;
        }

        .hints-box h3 {
            margin: 0 0 10px 0;
            color: #FF007F;
            font-size: 1.3rem;
            text-shadow: 1px 1px 0px #000;
            text-transform: uppercase;
            text-align: center;
        }

        .hints-box ul {
            margin: 0;
            padding-left: 20px;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            color: #333;
            font-size: 1rem;
            line-height: 1.5;
        }

        .hints-box li {
            margin-bottom: 8px;
        }

        input[type="text"] {
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            width: 85%;
            padding: 16px;
            font-size: 20px;
            border: 4px solid #000;
            border-radius: 40px;
            outline: none;
            text-align: center;
            box-shadow: 5px 5px 0px #000;
            background-color: #FFF;
        }

        input[type="text"]:focus {
            background-color: #FFD93D;
        }

        button {
            font-family: 'Arial Black', sans-serif;
            background-color: #FF007F; 
            color: white;
            border: 4px solid #000;
            padding: 14px 40px;
            font-size: 22px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 6px 6px 0px #000;
            transition: transform 0.05s, box-shadow 0.05s;
            margin: 15px 5px;
            text-transform: uppercase;
        }

        button:active {
            transform: translateY(6px) translateX(6px);
            box-shadow: 0px 0px 0px #000;
        }

        button.next-btn {
            background-color: #FFD93D; 
            color: #000;
        }

        .message-container {
            min-height: 80px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .message {
            font-family: 'Arial Black', sans-serif;
            font-size: 20px;
            line-height: 1.4;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
        }

        .success { color: #FFD93D; }
        .error { color: #FF007F; }
    </style>
</head>
<body>

    <div class="party-overlay">
        <div class="emoji-art art1">🎉🥳</div>
        <div class="emoji-art art2">🎥✨</div>
        <div class="emoji-art art3">😁📸</div>
        <div class="emoji-art art4">🥳🎉</div>
    </div>

    <h1>WHO'S THAT CLASSMATE?</h1>
    <p class="subtitle">SPECIAL EDITION: WORLD SELFIE DAY 🤳</p>

    <div class="score-board" id="score-display">SCORE: 0 / 1</div>

    <div class="game-container" id="main-container">
        <div class="image-box" id="box-container">
            <img id="selfie-image" src="" alt="Classmate Selfie">
        </div>

        <div class="hints-box">
            <h3>Mistery Hints:</h3>
            <ul id="hints-list">
                </ul>
        </div>

        <div class="input-section">
            <input type="text" id="guess-input" placeholder="TYPE THE NAME HERE..." onkeydown="if(event.key === 'Enter') checkGuess()">
            <br><br>
            <button onclick="checkGuess()">GUESS!</button>
            <button id="next-button" class="next-btn" onclick="nextPlayer()" style="display: none;">NEXT ➡️</button>
        </div>

        <div class="message-container">
            <div id="feedback-message" class="message"></div>
        </div>
    </div>

    <script>
        // --- GAME CONFIGURATION ---
        // Configurado con Lili y tus 3 enunciados exactos en inglés pasivo.
        const classmatesList = [
            { 
                photo: 'lili.jpg', 
                correctName: 'lili',
                hints: [
                    "A powerful woman is represented by her.",
                    "Our classroom mother is considered to be her.",
                    "She is known as the person who is annoyed the most by everyone in the room."
                ]
            }
        ];

        let currentIndex = 0;
        let correctAnswersCount = 0;

        const imgElement = document.getElementById('selfie-image');
        const boxContainer = document.getElementById('box-container');
        const mainContainer = document.getElementById('main-container');
        const inputElement = document.getElementById('guess-input');
        const messageElement = document.getElementById('feedback-message');
        const nextButton = document.getElementById('next-button');
        const scoreElement = document.getElementById('score-display');
        const hintsListElement = document.getElementById('hints-list');

        function updateScore() {
            scoreElement.innerText = "SCORE: " + correctAnswersCount + " / " + classmatesList.length;
        }

        function loadCharacter() {
            if (currentIndex < classmatesList.length) {
                // Cargar imagen y limpiar estados de revelado
                imgElement.src = classmatesList[currentIndex].photo;
                boxContainer.classList.remove('revealed');
                mainContainer.classList.remove('revealed-state');
                inputElement.value = '';
                inputElement.disabled = false;
                messageElement.innerText = '';
                nextButton.style.display = 'none';
                updateScore();

                // Inyectar de forma dinámica las pistas de la persona actual
                hintsListElement.innerHTML = "";
                classmatesList[currentIndex].hints.forEach(hint => {
                    const li = document.createElement('li');
                    li.innerText = hint;
                    hintsListElement.appendChild(li);
                });

            } else {
                scoreElement.style.display = 'none';
                document.querySelector('.game-container').innerHTML = `
                    <h2 style="color: #FFD93D; text-shadow: 3px 3px 0 #000; font-size: 2.5rem; margin-bottom:10px;">CONGRATULATIONS! 🎉🥳</h2>
                    <p style="color: #FFF; font-family: 'Arial', sans-serif; font-weight: bold; font-size: 1.4rem; text-shadow: 1.5px 1.5px 0 #000;">You finished the game with ${correctAnswersCount} correct out of ${classmatesList.length}!</p>
                    <button style="background-color: #FFD93D; color: #000; font-size: 18px;" onclick="location.reload()">PLAY AGAIN 🔁</button>
                `;
            }
        }

        function checkGuess() {
            const userAttempt = inputElement.value.trim().toLowerCase();
            const solution = classmatesList[currentIndex].correctName;

            if (userAttempt === '') return;

            if (userAttempt === solution) {
                correctAnswersCount++;
                updateScore();
                
                messageElement.className = "message success";
                messageElement.innerHTML = "CONGRATULATIONS!<br>YOU HAVE GUESSED CORRECTLY! 🎉";
                
                boxContainer.classList.add('revealed');
                mainContainer.classList.add('revealed-state'); // Activa cambio de color festivo en pistas
                inputElement.disabled = true;
                nextButton.style.display = 'inline-block';
            } else {
                messageElement.className = "message error";
                messageElement.innerHTML = "❌ TRY AGAIN!";
            }
        }

        function nextPlayer() {
            currentIndex++;
            loadCharacter();
        }

        window.onload = loadCharacter;
    </script>

</body>
</html>
